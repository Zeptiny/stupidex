name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - run: pip install pytest pytest-asyncio pytest-timeout
      - name: Smoke test (app imports & instantiates)
        run: python -c "from stupidex.app import Stupidex; app = Stupidex(); print('OK')"
      - name: Run tests
        run: python -m pytest tests/ -v
